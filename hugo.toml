baseURL = "https://TMA84.github.io/cvealert/"
languageCode = "en-us"
title = "CVE Alert"
description = "Automated security vulnerability feed from NVD, CISA KEV, and CERT-Bund."
paginate = 20
enableRobotsTXT = true

[markup.goldmark.renderer]
  unsafe = true

[security.funcs]
  getenv = ["^$"]

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5

[params]
  author = "CVE Security Feed"
  keywords = "CVE, vulnerability, cybersecurity, NVD, security advisory, CVSS"
