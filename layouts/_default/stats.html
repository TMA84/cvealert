{{ define "main" }}
{{ $posts := where .Site.RegularPages "Section" "posts" }}

<a href="{{ .Site.Home.RelPermalink }}" class="back-link">← Back to CVEs</a>

<h1 style="margin:1.5rem 0 .5rem">Statistics</h1>

<div class="stats-filter">
  <label>Source:</label>
  <button class="stats-src active" data-src="">All</button>
  <button class="stats-src" data-src="NVD">NVD</button>
  <button class="stats-src" data-src="CISA KEV">CISA KEV</button>
  <button class="stats-src" data-src="CERT-Bund">CERT-Bund</button>
</div>

<div class="stats-grid">
  <div class="stats-card">
    <h2>Severity Distribution</h2>
    <canvas id="severityChart" height="250"></canvas>
  </div>
  <div class="stats-card">
    <h2>Top Vendors</h2>
    <canvas id="vendorChart" height="250"></canvas>
  </div>
</div>

<div class="stats-card" style="margin-top:1rem">
  <h2>CVEs by Date</h2>
  <canvas id="timelineChart" height="150"></canvas>
</div>

<script id="post-data" type="application/json">
[{{ range $i, $p := $posts }}{{ if $i }},{{ end }}{"d":"{{ .Date.Format "2006-01-02" }}","v":"{{ .Params.vendor | default "unknown" }}","s":"{{ .Params.severity | default "UNKNOWN" }}","src":"{{ delimit (.Params.sources | default (slice "NVD")) "," }}"}{{ end }}]
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
const isDark=!document.body.classList.contains('light');
Chart.defaults.color=isDark?'#94a3b8':'#64748b';
Chart.defaults.borderColor=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';

const all=JSON.parse(document.getElementById('post-data').textContent);
let sevChart,venChart,tlChart;

function render(srcFilter){
  const data=srcFilter?all.filter(p=>p.src.split(',').includes(srcFilter)):all;

  // Severity
  let cr=0,hi=0,me=0,lo=0,un=0;
  data.forEach(p=>{
    if(p.s==='CRITICAL')cr++;else if(p.s==='HIGH')hi++;else if(p.s==='MEDIUM')me++;else if(p.s==='LOW')lo++;else un++;
  });
  if(sevChart)sevChart.destroy();
  sevChart=new Chart(document.getElementById('severityChart'),{type:'doughnut',data:{labels:['Critical','High','Medium','Low','Unknown'],datasets:[{data:[cr,hi,me,lo,un],backgroundColor:['#ef4444','#f59e0b','#3b82f6','#22c55e','#6b7280']}]},options:{plugins:{legend:{position:'bottom'}}}});

  // Vendors
  const vc={};
  data.forEach(p=>{if(p.v&&p.v!=='unknown')vc[p.v]=(vc[p.v]||0)+1});
  const sorted=Object.entries(vc).sort((a,b)=>b[1]-a[1]).slice(0,15);
  if(venChart)venChart.destroy();
  venChart=new Chart(document.getElementById('vendorChart'),{type:'bar',data:{labels:sorted.map(s=>s[0]),datasets:[{label:'CVEs',data:sorted.map(s=>s[1]),backgroundColor:'#3b82f6'}]},options:{indexAxis:'y',plugins:{legend:{display:false}}}});

  // Timeline
  const dc={};
  data.forEach(p=>{dc[p.d]=(dc[p.d]||0)+1});
  const dk=Object.keys(dc).sort(),dv=dk.map(k=>dc[k]);
  if(tlChart)tlChart.destroy();
  tlChart=new Chart(document.getElementById('timelineChart'),{type:'line',data:{labels:dk,datasets:[{label:'CVEs',data:dv,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3,pointRadius:2}]},options:{plugins:{legend:{display:false}}}});
}

document.querySelectorAll('.stats-src').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.stats-src').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.src);
  });
});

render('');
</script>
{{ end }}
