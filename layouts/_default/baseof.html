<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }} - Security Vulnerability Feed{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Params.description }}{{ .Params.description }}{{ else if .IsPage }}{{ .Summary | plainify | truncate 160 }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="keywords" content="{{ .Site.Params.keywords }}{{ with .Params.severity }}, {{ . }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "index.xml" | absURL }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ if .IsPage }}{{ .Summary | plainify | truncate 200 }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ .Title }}">
  <meta name="twitter:description" content="{{ if .IsPage }}{{ .Summary | plainify | truncate 200 }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  {{ if .IsPage }}
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"Article","headline":"{{ .Title }}","datePublished":"{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}","description":"{{ .Summary | plainify | truncate 200 }}","mainEntityOfPage":"{{ .Permalink }}"}
  </script>
  {{ end }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <header>
    <div class="container">
      <a href="{{ .Site.Home.RelPermalink }}" class="logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="8" fill="#3b82f6"/>
          <path d="M8 16l4 4 8-8" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>{{ .Site.Title }}</span>
      </a>
      <div class="header-actions">
        <button id="notify-btn" title="Enable notifications">🔔</button>
        <button id="theme-toggle" title="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <div class="container">
    <main>{{ block "main" . }}{{ end }}</main>
  </div>

  <footer>
    <div class="container">
      <p>Data from <a href="https://nvd.nist.gov/" rel="noopener">NVD/NIST</a>, <a href="https://www.cisa.gov/known-exploited-vulnerabilities-catalog" rel="noopener">CISA KEV</a>, and <a href="https://wid.cert-bund.de/" rel="noopener">CERT-Bund</a>.</p>
      <a href="{{ "impressum/" | relURL }}">Impressum</a> · <a href="{{ "datenschutz/" | relURL }}">Datenschutz</a> · <a href="{{ "index.xml" | relURL }}">RSS</a>
    </div>
  </footer>

  <script>
    const t=document.getElementById('theme-toggle'),s=localStorage.getItem('theme');
    if(s==='light'){document.body.classList.add('light');t.textContent='☀️'}
    t.addEventListener('click',()=>{document.body.classList.toggle('light');const l=document.body.classList.contains('light');t.textContent=l?'☀️':'🌙';localStorage.setItem('theme',l?'light':'dark')});
    const nb=document.getElementById('notify-btn');
    if('serviceWorker' in navigator && 'Notification' in window){
      const swUrl='{{ "sw.js" | absURL }}';
      const swScope=swUrl.replace('sw.js','');
      navigator.serviceWorker.register(swUrl,{scope:swScope}).then(()=>{
        console.log('SW registered');
        updateBtn();
      }).catch(e=>console.error('SW failed:',e));

      nb.addEventListener('click',async()=>{
        if(Notification.permission==='granted'){
          // Already enabled - disable by unregistering
          const reg=await navigator.serviceWorker.getRegistration();
          if(reg)await reg.unregister();
          nb.textContent='🔔';nb.title='Enable notifications';
        } else {
          const p=await Notification.requestPermission();
          if(p==='granted'){
            await navigator.serviceWorker.register(swUrl,{scope:swScope});
            updateBtn();startChecks();
          }
        }
      });

      function updateBtn(){
        if(Notification.permission==='granted'){
          nb.textContent='🔔✓';nb.title='Notifications enabled (click to disable)';
          startChecks();
        }
      }
      function startChecks(){
        check();setInterval(check,30*60*1000);
      }
      function check(){
        navigator.serviceWorker.ready.then(r=>{if(r.active)r.active.postMessage('check')});
      }
    } else {nb.style.display='none'}
  </script>
</body>
</html>
