<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }} - Daily CVE Vulnerability Feed{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Params.description }}{{ .Params.description }}{{ else if .IsPage }}{{ .Summary | plainify | truncate 160 }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="keywords" content="{{ .Site.Params.keywords }}{{ with .Params.severity }}, {{ . }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "index.xml" | absURL }}">

  {{/* Open Graph */}}
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ if .IsPage }}{{ .Summary | plainify | truncate 200 }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">

  {{/* Twitter */}}
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ .Title }}">
  <meta name="twitter:description" content="{{ if .IsPage }}{{ .Summary | plainify | truncate 200 }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  {{/* JSON-LD Structured Data */}}
  {{ if .IsPage }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ .Title }}",
    "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
    "description": "{{ .Summary | plainify | truncate 200 }}",
    "mainEntityOfPage": "{{ .Permalink }}"
  }
  </script>
  {{ end }}

  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <header>
    <div class="header-row">
      <h1><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
      <button id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">🌙</button>
    </div>
    <p>{{ .Site.Params.description }}</p>
  </header>
  <main>{{ block "main" . }}{{ end }}</main>
  <footer>
    <a href="{{ "impressum/" | relURL }}">Impressum</a> · <a href="{{ "datenschutz/" | relURL }}">Datenschutz</a>
  </footer>
  <script>
    const t = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved === 'light') { document.body.classList.add('light'); t.textContent = '☀️'; }
    t.addEventListener('click', () => {
      document.body.classList.toggle('light');
      const isLight = document.body.classList.contains('light');
      t.textContent = isLight ? '☀️' : '🌙';
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });
  </script>
</body>
</html>
